const valorFlutuantePlugin = {

    id:"valorFlutuante",

    afterDatasetsDraw(chart){

        const {ctx}=chart;

        ctx.save();

        chart.data.datasets.forEach((dataset,datasetIndex)=>{

            const meta = chart.getDatasetMeta(datasetIndex);

            if(meta.hidden) return;


            meta.data.forEach((element,index)=>{

                const valor = dataset.data[index];

                if(
                    valor===null ||
                    valor===undefined ||
                    (dataset._ocultarZero && Number(valor)===0)
                ) return;


                ctx.font = dataset._horas
                    ? "800 10px Arial"
                    : "900 11px Arial";


                ctx.fillStyle = dataset._horas
                    ? "#c026d3"
                    : "#0f1f4d";


                const texto =
                    dataset._moeda
                    ? moedaCurta(valor)
                    :
                    dataset._horas
                    ? `${Number(valor||0).toLocaleString("pt-BR")} h`
                    :
                    numero(valor);


                if(chart.options.indexAxis==="y"){

                    ctx.textAlign="left";
                    ctx.textBaseline="middle";

                    ctx.fillText(
                        texto,
                        element.x+8,
                        element.y
                    );

                }else{

                    ctx.textAlign="center";
                    ctx.textBaseline="bottom";

                    ctx.fillText(
                        texto,
                        element.x,
                        element.y-7
                    );

                }

            });

        });

        ctx.restore();

    }

};


Chart.register(valorFlutuantePlugin);



fetch("data.json")

.then(r=>r.json())

.then(json=>{

    dados = normalizarDados(json);

    renderImportacao();

})

.catch(()=>{

    dados = normalizarDados({});

    renderImportacao();

});



setInterval(()=>{

fetch("data.json")

.then(r=>r.json())

.then(json=>{

    dados = normalizarDados(json);

    const aba =
    document.querySelector(".menu button.active");


    if(aba){
        aba.click();
    }

});


},120000);



function normalizarDados(json){

    json = json || {};


    if(Array.isArray(json.esfig)){

        json.esfig={

            ultimaAfericao:
            json.ultimaAfericao || "",

            proximaAfericao:
            json.proximaAfericao || "",

            produtos:
            json.esfig

        };

    }


    return json;

}



function abrirAba(aba,botao){

document
.querySelectorAll(".menu button")
.forEach(b=>b.classList.remove("active"));


if(botao)
botao.classList.add("active");


destruirGrafico();


switch(aba){

case "importacao":
renderImportacao();
break;


case "esfig":
renderEsfig();
break;


case "descarte":
renderDescarte();
break;


case "amostra":
renderAmostra();
break;


case "retrabalho":
renderRetrabalho();
break;


case "equipamentos":
renderEquipamentos();
break;


case "informativo":
renderInformativo();
break;

}


}



function destruirGrafico(){

if(graficoAtual){

graficoAtual.destroy();

graficoAtual=null;

}

}



function numero(v){

return Number(v||0)
.toLocaleString("pt-BR");

}



function moeda(v){

return Number(v||0)
.toLocaleString(
"pt-BR",
{
style:"currency",
currency:"BRL"
}
);

}



function moedaCurta(v){

return moeda(v);

}
function renderDescarte(){
    if(!senhaDescarteLiberada){
        conteudo.innerHTML = `<div class="senha-box"><h2>🔒 Área Restrita - Descarte</h2><p>Digite a senha para acessar as informações.</p><input type="password" id="senhaDescarte" placeholder="Digite a senha"><button class="btn" onclick="validarSenhaDescarte()">Acessar</button><p id="erroSenha" style="color:#ef4444;font-weight:900;"></p></div>`;
        return;
    }
    const d = dados.descarte || {origens:[],top10:[]};
    const top = [...(d.top10 || [])].sort((a,b)=>Number(b.valor||0)-Number(a.valor||0));
    conteudo.innerHTML = `
        <div class="page-title">🗑 DESCARTE</div>
        <section class="cards">
            ${card("🗑","Valor Atual",moeda(d.total),"Financeiro impactado")}
            ${card("📋","Último Descarte",moeda(d.ultimoDescarte),"Última operação registrada")}
        </section>
        <section class="grid-2">
            <div class="panel"><h3>📊 Descarte por Origem</h3><div class="chart-box tall"><canvas id="grafico"></canvas></div><h3 style="margin-top:10px;">Top 3 Origens de Destino</h3>${rankTop3Origem(d.origens || [])}</div>
            <div class="panel"><h3>Top 10 Descarte</h3>${tabelaFixa(["SKU","Descrição","Valor"], montarLinhasTopDescarte(top), true)}</div>
        </section>
    `;
    graficoAtual = new Chart(document.getElementById("grafico"),{
        type:"bar",
        data:{ labels:(d.origens || []).map(i=>i.nome), datasets:[{label:"Valor", data:(d.origens || []).map(i=>i.valor), backgroundColor:["#1d4eff","#0f3cc9","#6b7cff","#f04dd8","#22c55e","#38bdf8","#8b5cf6"], borderWidth:0, _moeda:true}] },
        options:{...baseOptions(), indexAxis:"y", plugins:{legend:{display:false}}}
    });
}

function validarSenhaDescarte(){
    const senha = document.getElementById("senhaDescarte").value;
    if(senha === "SGQ2026"){ senhaDescarteLiberada = true; renderDescarte(); }
    else document.getElementById("erroSenha").innerText = "Senha incorreta.";
}

function renderAmostra(){
    const a = dados.amostras || {mensal:[],top10:[],totalHoras:0};
    const totalAno = (a.mensal || []).reduce((s,i)=>s+Number(i.valor||0),0);
    conteudo.innerHTML = `
        <div class="page-title">📦 AMOSTRA</div>
        <section class="cards">
            ${card("📦","Amostras Solicitadas no Ano",numero(totalAno),"Total acumulado")}
            ${card("⏱","Total de Horas",numero(a.totalHoras),"Horas destinadas")}
        </section>
        <section class="grid-2">
            <div class="panel"><h3>📈 Evolução Mensal de Amostras</h3><div class="chart-box"><canvas id="grafico"></canvas></div></div>
            <div class="panel"><h3>Amostras Mais Solicitadas</h3>${tabelaFixa(["SKU","Descrição","Qtd."], montarLinhasAmostra(a.top10 || []), true)}</div>
        </section>
    `;
    const opcoesAmostra = baseOptions();
    opcoesAmostra.interaction = {mode:"index", intersect:false};
    opcoesAmostra.scales = {
        y:{
            beginAtZero:true,
            position:"left",
            title:{display:true,text:"Quantidade de amostras",color:"#0f1f4d",font:{weight:"bold"}},
            grid:{color:"rgba(15,31,77,.08)"},
            ticks:{color:"#5c6c96"}
        },
        y1:{
            beginAtZero:true,
            position:"right",
            title:{display:true,text:"Horas",color:"#c026d3",font:{weight:"bold"}},
            grid:{drawOnChartArea:false},
            ticks:{color:"#c026d3"}
        },
        x:{
            grid:{display:false},
            ticks:{color:"#5c6c96"}
        }
    };

    const datasetAmostras = dsLine("Amostras",(a.mensal || []).map(i=>Number(i.valor || 0)),"#1d4eff");
    datasetAmostras.yAxisID = "y";
    datasetAmostras._ocultarZero = true;

    const datasetHoras = dsLine("Horas",(a.mensal || []).map(i=>Number(i.horas || 0)),"#c026d3");
    datasetHoras.yAxisID = "y1";
    datasetHoras._horas = true;
    datasetHoras._ocultarZero = true;
    datasetHoras.borderWidth = 2;
    datasetHoras.borderDash = [7,5];
    datasetHoras.pointStyle = "rectRot";
    datasetHoras.pointRadius = 5;
    datasetHoras.pointHoverRadius = 7;

    graficoAtual = new Chart(document.getElementById("grafico"),{
        type:"line",
        data:{
            labels:(a.mensal || []).map(i=>i.mes),
            datasets:[datasetAmostras,datasetHoras]
        },
        options:opcoesAmostra
    });
}

    ${

function atualizarGraficoRetrabalho(){

    const r = dados.retrabalho || {fabricantes:[]};

    const select = document.getElementById("filtroFabricante");

    if(!select) return;

    const nome = select.value;

    const fabricante = (r.fabricantes || [])
    .find(
        f => String(f.Fabricante).trim() === String(nome).trim()
    );

    if(!fabricante) return;

    const canvas = document.getElementById("grafico");

    if(!canvas) return;

    destruirGrafico();

    graficoAtual = new Chart(
        canvas,
        {
            type:"bar",
            data:{
                labels:[
                    "Quantidade Retrabalhada",
                    "Horas"
                ],
                datasets:[{
                    label:fabricante.Fabricante,
                    data:[
                        Number(fabricante["Quantidade Retrabalhada"] || 0),
                        Number(fabricante["Horas"] || 0)
                    ],
                    backgroundColor:[
                        "#1d4eff",
                        "#f04dd8"
                    ],
                    borderWidth:0
                }]
            },
            options:{
                ...baseOptions(),
                plugins:{
                    legend:{
                        display:true
                    }
                }
            }
        }
    );

}

function mostrarInfo(tipo){
    const textos = {
        importacao:{titulo:"Processo de Inspeção de Importação",texto:"O processo acompanha a chegada dos produtos importados, conferência documental, verificação dos lotes, emissão de laudos e definição da situação do produto como aprovado ou reprovado.",steps:["Chegada","Conferência","Inspeção","Laudo","Liberação"]},
        esfig:{titulo:"Processo de Esfigmomanômetro",texto:"O produto chega pela importação. Solicitamos a GRU ao Inmetro, realizamos a desmontagem, retiramos a embalagem de venda e o plástico bolha, colocamos os itens em bandejas, disponibilizamos ao Inmetro para aferição, colamos o selo, retornamos ao plástico bolha, acondicionamos na embalagem de venda e liberamos para venda.",steps:["Importação","GRU Inmetro","Desmontagem","Bandeja","Aferição","Selo","Montagem","Venda"]},
        descarte:{titulo:"Processo de Descarte",texto:"Controla produtos vencidos, avariados, reprovados ou destinados pela empresa, garantindo rastreabilidade, justificativa da origem e controle dos valores envolvidos.",steps:["Identificação","Classificação","Aprovação","Registro","Destinação"]},
        amostra:{titulo:"Processo de Amostra",texto:"Acompanha solicitações de amostras, evolução mensal, produtos mais solicitados, quantidade movimentada e horas aplicadas na atividade.",steps:["Solicitação","Separação","Conferência","Registro","Envio"]},
        retrabalho:{titulo:"Processo de Retrabalho",texto:"Acompanha itens que precisam de correção, reembalagem, ajuste, revisão, identificação ou nova conferência antes da liberação.",steps:["Identificação","Motivo","Execução","Validação","Liberação"]},
        equipamentos:{titulo:"Processo de Equipamentos",texto:"Apresenta a situação dos equipamentos disponíveis, em manutenção, em curso ou em estoque, apoiando a gestão dos recursos.",steps:["Cadastro","Controle","Manutenção","Uso","Estoque"]}
    };
    const t = textos[tipo];
    document.getElementById("infoTitulo").innerText = t.titulo;
    document.getElementById("infoTexto").innerText = t.texto;
    document.getElementById("infoSteps").innerHTML = t.steps.map((s,i)=>`<div class="step"><span>${i+1}</span><br>${s}</div>`).join("");
}
function dsLine(label,data,color){

return {

label,

data:data || [],

borderColor:color,

backgroundColor:
color ? color+"30" : "#cccccc",

pointBackgroundColor:color,

pointRadius:4,

borderWidth:3,

tension:.35,

fill:false

};

}



function tabelaFixa(headers,rows,infinito){

const vazio =
!rows ||
rows.length===0;


const body =
vazio
?
`<tr><td colspan="${headers.length}">
Sem dados cadastrados
</td></tr>`
:
rows;


const duplicated =
infinito
?
body+body
:
body;


return `

<div class="table-wrap">

<table>

<thead>

<tr>

${headers.map(h=>`<th>${h}</th>`).join("")}

</tr>

</thead>

</table>


<div class="table-scroll ${infinito?"infinite":""}">

<div class="${infinito?"scroll-content":""}">

<table>

<tbody>

${duplicated}

</tbody>

</table>

</div>

</div>

</div>

`;

}



function montarLinhasImportacao(lista){

if(!lista || !lista.length)
return "";


return lista.map(i=>`

<tr>

<td>${i.po || i.PO || "-"}</td>

<td class="desc">
${i.descricao || i.produto || "-"}
</td>

<td class="${
(i.status || "")
==="Aprovado"
?
"status-ok"
:
"status-nok"
}">

${i.status || "-"}

</td>

<td>
${i.observacao || "-"}
</td>

</tr>

`).join("");

}
