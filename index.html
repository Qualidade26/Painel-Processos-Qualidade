<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Processos SGQ</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
    --bg:#dfeeff;
    --top1:#0f3cc9;
    --top2:#1c57ff;
    --card:#f8fbff;
    --card2:#eef5ff;
    --primary:#1d4eff;
    --secondary:#6b7cff;
    --green:#22c55e;
    --red:#ef4444;
    --orange:#f97316;
    --purple:#8b5cf6;
    --text:#0f1f4d;
    --muted:#5c6c96;
    --line:#dce8ff;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:var(--bg);
    color:var(--text);
}

.header{
    height:70px;
    background:linear-gradient(90deg,var(--top1),var(--top2));
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
    font-weight:900;
    letter-spacing:.5px;
}

.layout{
    display:flex;
    min-height:calc(100vh - 70px);
}

.menu{
    width:210px;
    background:#f8fbff;
    padding:14px;
    border-right:1px solid var(--line);
}

.menu button{
    width:100%;
    border:none;
    background:var(--card2);
    color:var(--text);
    padding:12px 10px;
    margin-bottom:9px;
    border-radius:14px;
    font-size:14px;
    font-weight:900;
    cursor:pointer;
    text-align:center;
    transition:.2s;
}

.menu button:hover,
.menu button.active{
    background:var(--primary);
    color:white;
    transform:scale(1.02);
}

.content{
    flex:1;
    padding:18px;
}

.page-title{
    text-align:center;
    font-size:25px;
    font-weight:900;
    color:var(--top1);
    margin-bottom:16px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:14px;
    margin-bottom:16px;
}

.card{
    background:var(--card);
    border-radius:18px;
    padding:16px;
    box-shadow:0 8px 22px rgba(0,0,0,.08);
    border:1px solid var(--line);
    text-align:center;
}

.card h3{
    margin:0 0 8px 0;
    font-size:15px;
    color:var(--muted);
    font-weight:900;
}

.card strong{
    font-size:26px;
    color:var(--primary);
    font-weight:900;
}

.grid-2{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:16px;
    margin-bottom:16px;
}

.table-card{
    background:var(--card);
    border-radius:18px;
    padding:16px;
    box-shadow:0 8px 22px rgba(0,0,0,.08);
    border:1px solid var(--line);
}

.table-card h3{
    text-align:center;
    margin-top:0;
    color:var(--top1);
}

table{
    width:100%;
    border-collapse:collapse;
    font-size:13px;
}

th{
    background:var(--primary);
    color:white;
    padding:10px;
    text-align:center;
}

td{
    padding:9px;
    border-bottom:1px solid var(--line);
    text-align:center;
    font-weight:700;
}

.status-ok{
    color:var(--green);
    font-weight:900;
}

.status-nok{
    color:var(--red);
    font-weight:900;
}

.fluxo{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
}

.fluxo-item{
    background:var(--card2);
    border-radius:16px;
    padding:16px;
    text-align:center;
    font-weight:900;
    color:var(--primary);
    border:1px solid var(--line);
}

.progress-box{
    width:100%;
    height:24px;
    background:#dce8ff;
    border-radius:20px;
    overflow:hidden;
    margin-top:12px;
}

.progress-bar{
    height:100%;
    background:linear-gradient(90deg,var(--top1),var(--top2));
    color:white;
    text-align:center;
    font-size:13px;
    font-weight:900;
    line-height:24px;
}

.scroll-box{
    max-height:250px;
    overflow:hidden;
    position:relative;
}

.scroll-content{
    animation:scrollVertical 22s linear infinite;
}

.scroll-box:hover .scroll-content{
    animation-play-state:paused;
}

@keyframes scrollVertical{
    0%{transform:translateY(0);}
    100%{transform:translateY(-50%);}
}

.senha-box{
    max-width:420px;
    margin:60px auto;
    background:var(--card);
    border-radius:20px;
    padding:25px;
    text-align:center;
    box-shadow:0 8px 22px rgba(0,0,0,.08);
}

.senha-box input{
    width:100%;
    padding:14px;
    border:1px solid var(--line);
    border-radius:12px;
    margin:15px 0;
    text-align:center;
    font-size:18px;
}

.senha-box button,
.info-menu button{
    border:none;
    background:var(--primary);
    color:white;
    padding:12px 18px;
    border-radius:12px;
    font-weight:900;
    cursor:pointer;
}

.info-menu{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
    margin-bottom:16px;
}

.info-text{
    font-size:17px;
    line-height:1.7;
    text-align:center;
    max-width:900px;
    margin:auto;
}

select{
    padding:10px;
    border-radius:10px;
    border:1px solid var(--line);
    font-weight:900;
    margin-bottom:10px;
}

@media(max-width:900px){
    .layout{
        flex-direction:column;
    }

    .menu{
        width:100%;
        display:grid;
        grid-template-columns:repeat(2,1fr);
        gap:8px;
    }

    .menu button{
        margin-bottom:0;
    }

    .grid-2{
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<header class="header">
    Painel de Processos SGQ
</header>

<div class="layout">

    <aside class="menu">
        <button class="active" onclick="abrirAba('importacao', this)">📦<br>Inspeção de Importação</button>
        <button onclick="abrirAba('esfig', this)">⏱<br>Esfigmomanômetro</button>
        <button onclick="abrirAba('descarte', this)">🗑<br>Descarte</button>
        <button onclick="abrirAba('amostra', this)">📦<br>Amostra</button>
        <button onclick="abrirAba('retrabalho', this)">🔄<br>Retrabalho</button>
        <button onclick="abrirAba('equipamentos', this)">🛠<br>Equipamentos</button>
        <button onclick="abrirAba('informativo', this)">ℹ️<br>Informativo do Processo</button>
    </aside>

    <main class="content" id="conteudo"></main>

</div>

<script>
let dados = {};
let graficoAtual = null;
let senhaDescarteLiberada = false;

fetch("data.json")
.then(response => response.json())
.then(json => {
    dados = json;
    renderImportacao();
})
.catch(() => {
    dados = {};
    renderImportacao();
});

function abrirAba(aba, botao){
    document.querySelectorAll(".menu button").forEach(btn => btn.classList.remove("active"));
    botao.classList.add("active");

    if(graficoAtual){
        graficoAtual.destroy();
        graficoAtual = null;
    }

    if(aba === "importacao") renderImportacao();
    if(aba === "esfig") renderEsfig();
    if(aba === "descarte") renderDescarte();
    if(aba === "amostra") renderAmostra();
    if(aba === "retrabalho") renderRetrabalho();
    if(aba === "equipamentos") renderEquipamentos();
    if(aba === "informativo") renderInformativo();
}

function moeda(valor){
    return Number(valor || 0).toLocaleString("pt-BR", {
        style:"currency",
        currency:"BRL"
    });
}

function numero(valor){
    return Number(valor || 0).toLocaleString("pt-BR");
}

function renderImportacao(){
    const imp = dados.importacao || {
        processosAno:0,
        totalSku:0,
        totalLotes:0,
        laudosEmitidos:0,
        totalHoras:0,
        mensal:[],
        fluxo:[]
    };

    conteudo.innerHTML = `
        <div class="page-title">📦 Inspeção de Importação</div>

        <section class="cards">
            <div class="card"><h3>Processos por Ano</h3><strong>${numero(imp.processosAno)}</strong></div>
            <div class="card"><h3>Total de SKU</h3><strong>${numero(imp.totalSku)}</strong></div>
            <div class="card"><h3>Total de Lotes</h3><strong>${numero(imp.totalLotes)}</strong></div>
            <div class="card"><h3>Laudos Emitidos</h3><strong>${numero(imp.laudosEmitidos)}</strong></div>
            <div class="card"><h3>Total de Horas</h3><strong>${numero(imp.totalHoras)}</strong></div>
        </section>

        <section class="table-card">
            <h3>Evolução Mensal da Inspeção de Importação</h3>
            <canvas id="grafico"></canvas>
        </section>

        <section class="table-card">
            <h3>Fluxo Inspeção de Importação</h3>
            <table>
                <thead>
                    <tr>
                        <th>PO</th>
                        <th>Descrição do Produto</th>
                        <th>Status</th>
                        <th>Observação</th>
                    </tr>
                </thead>
                <tbody>
                    ${montarTabelaImportacao(imp.fluxo)}
                </tbody>
            </table>
        </section>
    `;

    graficoAtual = new Chart(document.getElementById("grafico"), {
        type:"line",
        data:{
            labels:(imp.mensal || []).map(i => i.mes),
            datasets:[
                {label:"Processos", data:(imp.mensal || []).map(i => i.processos || 0), borderWidth:3},
                {label:"SKU", data:(imp.mensal || []).map(i => i.sku || 0), borderWidth:3},
                {label:"Lotes", data:(imp.mensal || []).map(i => i.lotes || 0), borderWidth:3},
                {label:"Laudos", data:(imp.mensal || []).map(i => i.laudos || 0), borderWidth:3},
                {label:"Horas", data:(imp.mensal || []).map(i => i.horas || 0), borderWidth:3}
            ]
        }
    });
}

function montarTabelaImportacao(lista){
    if(!lista || lista.length === 0){
        return `<tr><td colspan="4">Sem dados cadastrados</td></tr>`;
    }

    return lista.map(item => `
        <tr>
            <td>${item.po || "-"}</td>
            <td>${item.descricao || "-"}</td>
            <td class="${item.status === "Aprovado" ? "status-ok" : "status-nok"}">${item.status || "-"}</td>
            <td>${item.observacao || "-"}</td>
        </tr>
    `).join("");
}

function renderEsfig(){
    const esfig = dados.esfig || {};
    const produtos = esfig.produtos || [];
    const totalAguardando = produtos.reduce((s,i) => s + Number(i.aguardando || 0),0);
    const totalDesmontado = produtos.reduce((s,i) => s + Number(i.desmontado || 0),0);
    const totalAferidos = produtos.reduce((s,i) => s + Number(i.aferidos || 0),0);
    const totalGeral = totalAguardando + totalDesmontado + totalAferidos;
    const conclusao = totalGeral > 0 ? ((totalAferidos / totalGeral) * 100).toFixed(1) : 0;

    conteudo.innerHTML = `
        <div class="page-title">⏱ Esfigmomanômetro</div>

        <section class="cards">
            <div class="card"><h3>Total Gasto por GRU</h3><strong>${moeda(esfig.totalGru)}</strong></div>
            <div class="card"><h3>Última Aferição</h3><strong>${esfig.ultimaAfericao || "-"}</strong></div>
            <div class="card"><h3>Próxima Aferição</h3><strong>${esfig.proximaAfericao || "-"}</strong></div>
            <div class="card"><h3>Total de Horas</h3><strong>${numero(esfig.totalHoras)}</strong></div>
        </section>

        <section class="grid-2">
            <div class="table-card">
                <h3>Fluxo Operacional</h3>
                <div class="fluxo">
                    <div class="fluxo-item">Aguardando<br>${numero(totalAguardando)}</div>
                    <div class="fluxo-item">Desmontado<br>${numero(totalDesmontado)}</div>
                    <div class="fluxo-item">Aferido / Montagem<br>${numero(totalAferidos)}</div>
                </div>
                <div class="progress-box">
                    <div class="progress-bar" style="width:${conclusao}%">${conclusao}% Concluído</div>
                </div>
            </div>

            <div class="table-card">
                <h3>Total Anual por SKU</h3>
                <canvas id="grafico"></canvas>
            </div>
        </section>

        <section class="table-card">
            <h3>Produtos Esfigmomanômetro</h3>
            <table>
                <thead>
                    <tr>
                        <th>SKU</th>
                        <th>Descrição</th>
                        <th>Aguardando</th>
                        <th>Desmontado</th>
                        <th>Aferidos</th>
                        <th>Última Aferição</th>
                    </tr>
                </thead>
                <tbody>
                    ${produtos.map(i => `
                        <tr>
                            <td>${i.sku}</td>
                            <td>${i.descricao}</td>
                            <td>${numero(i.aguardando)}</td>
                            <td>${numero(i.desmontado)}</td>
                            <td>${numero(i.aferidos)}</td>
                            <td>${i.ultimaAfericao || "-"}</td>
                        </tr>
                    `).join("")}
                </tbody>
            </table>
        </section>
    `;

    graficoAtual = new Chart(document.getElementById("grafico"), {
        type:"bar",
        data:{
            labels:produtos.map(i => `${i.sku}`),
            datasets:[{
                label:"Total Anual",
                data:produtos.map(i => Number(i.aguardando || 0) + Number(i.desmontado || 0) + Number(i.aferidos || 0)),
                borderWidth:2
            }]
        },
        options:{
            plugins:{legend:{display:false}}
        }
    });
}

function renderDescarte(){
    if(!senhaDescarteLiberada){
        conteudo.innerHTML = `
            <div class="senha-box">
                <h2>🔒 Área Restrita - Descarte</h2>
                <p>Digite a senha para acessar os dados de descarte.</p>
                <input type="password" id="senhaDescarte" placeholder="Digite a senha">
                <button onclick="validarSenhaDescarte()">Acessar</button>
                <p id="erroSenha" style="color:red;font-weight:900;"></p>
            </div>
        `;
        return;
    }

    const d = dados.descarte || {origens:[], top10:[]};

    conteudo.innerHTML = `
        <div class="page-title">🗑 Descarte</div>

        <section class="cards">
            <div class="card"><h3>Valor Atual</h3><strong>${moeda(d.total)}</strong></div>
            <div class="card"><h3>Último Descarte</h3><strong>${moeda(d.ultimoDescarte)}</strong></div>
        </section>

        <section class="grid-2">
            <div class="table-card">
                <h3>Valores por Origem</h3>
                <canvas id="grafico"></canvas>
            </div>

            <div class="table-card">
                <h3>Top 10 Descarte</h3>
                <div class="scroll-box">
                    <div class="scroll-content">
                        ${montarTopDescarte(d.top10)}
                        ${montarTopDescarte(d.top10)}
                    </div>
                </div>
            </div>
        </section>
    `;

    graficoAtual = new Chart(document.getElementById("grafico"), {
        type:"bar",
        data:{
            labels:d.origens.map(i => i.nome),
            datasets:[{
                label:"Valor",
                data:d.origens.map(i => i.valor),
                borderWidth:2
            }]
        },
        options:{
            indexAxis:"y"
        }
    });
}

function validarSenhaDescarte(){
    const senha = document.getElementById("senhaDescarte").value;

    if(senha === "SGQ2026"){
        senhaDescarteLiberada = true;
        renderDescarte();
    }else{
        document.getElementById("erroSenha").innerText = "Senha incorreta.";
    }
}

function montarTopDescarte(lista){
    if(!lista || lista.length === 0){
        return `<p style="text-align:center;font-weight:900;">Sem dados cadastrados</p>`;
    }

    return `
        <table>
            <thead>
                <tr>
                    <th>SKU</th>
                    <th>Descrição</th>
                    <th>Valor</th>
                </tr>
            </thead>
            <tbody>
                ${lista.map(i => `
                    <tr>
                        <td>${i.sku}</td>
                        <td>${i.descricao}</td>
                        <td>${moeda(i.valor)}</td>
                    </tr>
                `).join("")}
            </tbody>
        </table>
    `;
}

function renderAmostra(){
    const a = dados.amostras || {mensal:[], top10:[], totalHoras:0};
    const totalAno = (a.mensal || []).reduce((s,i) => s + Number(i.valor || 0),0);

    conteudo.innerHTML = `
        <div class="page-title">📦 Amostra</div>

        <section class="cards">
            <div class="card"><h3>Amostras Solicitadas no Ano</h3><strong>${numero(totalAno)}</strong></div>
            <div class="card"><h3>Total de Horas</h3><strong>${numero(a.totalHoras)}</strong></div>
        </section>

        <section class="grid-2">
            <div class="table-card">
                <h3>Evolução Mensal de Amostras</h3>
                <canvas id="grafico"></canvas>
            </div>

            <div class="table-card">
                <h3>Top 10 Amostras Mais Solicitadas</h3>
                <table>
                    <thead>
                        <tr>
                            <th>SKU</th>
                            <th>Descrição</th>
                            <th>Quantidade</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${(a.top10 || []).map(i => `
                            <tr>
                                <td>${i.sku}</td>
                                <td>${i.descricao}</td>
                                <td>${numero(i.quantidade)}</td>
                            </tr>
                        `).join("")}
                    </tbody>
                </table>
            </div>
        </section>
    `;

    graficoAtual = new Chart(document.getElementById("grafico"), {
        type:"line",
        data:{
            labels:a.mensal.map(i => i.mes),
            datasets:[{
                label:"Amostras",
                data:a.mensal.map(i => i.valor),
                borderWidth:3,
                tension:.4
            }]
        }
    });
}

function renderRetrabalho(){
    const r = dados.retrabalho || {totalAno:0,totalHoras:0,fornecedores:[], tabela:[]};

    conteudo.innerHTML = `
        <div class="page-title">🔄 Retrabalho</div>

        <section class="cards">
            <div class="card"><h3>Total de Retrabalho no Ano</h3><strong>${numero(r.totalAno)}</strong></div>
            <div class="card"><h3>Total de Horas</h3><strong>${numero(r.totalHoras)}</strong></div>
        </section>

        <section class="grid-2">
            <div class="table-card">
                <h3>Fornecedor</h3>
                <select id="filtroFornecedor" onchange="atualizarGraficoRetrabalho()">
                    ${(r.fornecedores || []).map(f => `<option value="${f.nome}">${f.nome}</option>`).join("")}
                </select>
                <canvas id="grafico"></canvas>
            </div>

            <div class="table-card">
                <h3>Tabela de Retrabalho</h3>
                <div class="scroll-box">
                    <div class="scroll-content">
                        ${montarTabelaRetrabalho(r.tabela)}
                        ${montarTabelaRetrabalho(r.tabela)}
                    </div>
                </div>
            </div>
        </section>
    `;

    atualizarGraficoRetrabalho();
}

function atualizarGraficoRetrabalho(){
    const r = dados.retrabalho || {fornecedores:[]};
    const nome = document.getElementById("filtroFornecedor")?.value;
    const fornecedor = (r.fornecedores || []).find(f => f.nome === nome) || {mensal:[]};

    if(graficoAtual){
        graficoAtual.destroy();
    }

    graficoAtual = new Chart(document.getElementById("grafico"), {
        type:"bar",
        data:{
            labels:(fornecedor.mensal || []).map(i => i.mes),
            datasets:[{
                label:"Retrabalho Mensal",
                data:(fornecedor.mensal || []).map(i => i.quantidade || 0),
                borderWidth:2
            }]
        }
    });
}

function montarTabelaRetrabalho(lista){
    if(!lista || lista.length === 0){
        return `<p style="text-align:center;font-weight:900;">Sem dados cadastrados</p>`;
    }

    return `
        <table>
            <thead>
                <tr>
                    <th>Motivo</th>
                    <th>Fabricante</th>
                    <th>Quantidade</th>
                    <th>Horas</th>
                </tr>
            </thead>
            <tbody>
                ${lista.map(i => `
                    <tr>
                        <td>${i.motivo}</td>
                        <td>${i.fabricante}</td>
                        <td>${numero(i.quantidade)}</td>
                        <td>${numero(i.horas)}</td>
                    </tr>
                `).join("")}
            </tbody>
        </table>
    `;
}

function renderEquipamentos(){
    const lista = dados.equipamentos || [];

    conteudo.innerHTML = `
        <div class="page-title">🛠 Equipamentos</div>

        <section class="table-card">
            <h3>Controle de Equipamentos</h3>
            <table>
                <thead>
                    <tr>
                        <th>Produto</th>
                        <th>Descrição</th>
                        <th>Quantidade</th>
                        <th>Observação</th>
                    </tr>
                </thead>
                <tbody>
                    ${lista.length ? lista.map(i => `
                        <tr>
                            <td>${i.produto}</td>
                            <td>${i.descricao}</td>
                            <td>${numero(i.quantidade)}</td>
                            <td>${i.observacao}</td>
                        </tr>
                    `).join("") : `<tr><td colspan="4">Sem dados cadastrados</td></tr>`}
                </tbody>
            </table>
        </section>
    `;
}

function renderInformativo(){
    conteudo.innerHTML = `
        <div class="page-title">ℹ️ Informativo do Processo</div>

        <div class="info-menu">
            <button onclick="mostrarInfo('importacao')">📦 Importação</button>
            <button onclick="mostrarInfo('esfig')">⏱ Esfig</button>
            <button onclick="mostrarInfo('descarte')">🗑 Descarte</button>
            <button onclick="mostrarInfo('amostra')">📦 Amostra</button>
            <button onclick="mostrarInfo('retrabalho')">🔄 Retrabalho</button>
            <button onclick="mostrarInfo('equipamentos')">🛠 Equipamentos</button>
        </div>

        <section class="table-card">
            <h3 id="infoTitulo">Selecione um processo</h3>
